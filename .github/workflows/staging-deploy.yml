name: Deploy to Staging

on:
  push:
    branches:
      - develop

env:
  NODE_VERSION: "20.x"

jobs:
  # Code quality checks
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Generate Prisma Client
        run: npx prisma generate

  # Build application
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-staging
          path: dist/
          retention-days: 7

  # Deploy to staging server (optional - uncomment if you have staging server)
  # deploy-staging:
  #   name: Deploy to Staging Server
  #   runs-on: ubuntu-latest
  #   needs: [code-quality, build]
  #
  #   steps:
  #     - name: Deploy to Staging EC2
  #       uses: appleboy/ssh-action@v1.2.0
  #       with:
  #         host: ${{ secrets.STAGING_EC2_HOST }}
  #         username: ${{ secrets.STAGING_EC2_USER }}
  #         key: ${{ secrets.STAGING_EC2_SSH_KEY }}
  #         script: |
  #           cd ~/Track-Hire-BE-Staging
  #           git checkout develop
  #           git pull origin develop
  #           npm ci
  #           npx prisma generate
  #           npx prisma migrate deploy
  #           npm run build
  #           pm2 restart track-hire-api-staging || pm2 start dist/server.js --name track-hire-api-staging

  # Notification
  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: [code-quality, build]
    if: always()

    steps:
      - name: Build success
        if: needs.build.result == 'success'
        run: |
          echo "✅ Staging build successful!"
          echo "Branch: develop"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

      - name: Build failure
        if: needs.build.result == 'failure'
        run: |
          echo "❌ Staging build failed!"
          echo "Branch: develop"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          exit 1
