name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: "20.x"

jobs:
  # Validate PR title and description
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
          requireScope: false

  # Run code quality checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx prisma generate

      - name: Run Prettier check
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run type-check

  # Build the application
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Check build size
        run: |
          echo "📦 Build size:"
          du -sh dist/
          echo "📊 Build files:"
          ls -lh dist/

  # Check for security vulnerabilities
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # Add PR comment with results
  comment:
    name: Comment Results
    runs-on: ubuntu-latest
    needs: [validate-pr, code-quality, build, security]
    if: always()

    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'PR Validation': '${{ needs.validate-pr.result }}',
              'Code Quality': '${{ needs.code-quality.result }}',
              'Build': '${{ needs.build.result }}',
              'Security': '${{ needs.security.result }}'
            };

            const getEmoji = (status) => {
              if (status === 'success') return '✅';
              if (status === 'failure') return '❌';
              return '⏭️';
            };

            let comment = '## 🤖 PR Checks Results\n\n';
            for (const [check, result] of Object.entries(results)) {
              comment += `${getEmoji(result)} **${check}**: ${result}\n`;
            }

            comment += '\n---\n';
            comment += `📝 Commit: ${context.sha.substring(0, 7)}\n`;
            comment += `👤 Author: @${context.actor}\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
